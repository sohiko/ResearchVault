# /etc/apache2/sites-available/rv.insas.jp.conf
# /etc/apache2/sites-available/rv.insas.jp-ssl.conf
# に分割して配置するか、既存ファイルをこの内容で置き換えてください。
#
# 設置:
#   sudo cp rv.insas.jp.apache.conf /tmp/rv.conf
#   sudo nano /etc/apache2/sites-available/rv.insas.jp.conf      # :80 部分
#   sudo nano /etc/apache2/sites-available/rv.insas.jp-ssl.conf   # :443 部分
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# 前提: researchvault.service が 127.0.0.1:3001 で listen

# ---------- HTTP (:80) ----------
<VirtualHost *:80>
    ServerName rv.insas.jp

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/rv.insas.jp-error.log
    CustomLog ${APACHE_LOG_DIR}/rv.insas.jp-access.log combined
</VirtualHost>

# ---------- HTTPS (:443) ----------
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName rv.insas.jp

    SSLEngine on
    # certbot --apache -d rv.insas.jp 実行済みのパス（存在しない場合は sudo certbot certificates で確認）
    SSLCertificateFile      /etc/letsencrypt/live/rv.insas.jp/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/rv.insas.jp/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # 旧: DocumentRoot /var/www/ResearchVault/web/dist  ← これが API を HTML にする原因

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/rv.insas.jp-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/rv.insas.jp-ssl-access.log combined
</VirtualHost>
</IfModule>
