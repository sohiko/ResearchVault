# ResearchVault — Apache2 バーチャルホスト（リバースプロキシ）
# 設置例:
#   sudo cp apache-rv.insas.jp.conf /etc/apache2/sites-available/researchvault.conf
#   sudo a2ensite researchvault
#   sudo a2dissite 000-default   # 必要に応じて
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# 前提: Node (researchvault.service) が 127.0.0.1:3001 で待ち受け
# ※ dev.insas.jp は 3000 を使用中のため rv は 3001 を使用

<VirtualHost *:80>
    ServerName rv.insas.jp

    # Let's Encrypt 取得後は HTTPS へリダイレクト（certbot --apache が自動追加する場合あり）
    # Redirect permanent / https://rv.insas.jp/

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/researchvault-error.log
    CustomLog ${APACHE_LOG_DIR}/researchvault-access.log combined
</VirtualHost>

