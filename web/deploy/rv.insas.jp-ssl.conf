# 本番ファイル: /etc/apache2/sites-available/rv.insas.jp-ssl.conf
# insas.jp 他サイトには触れない。rv.insas.jp のみ ProxyPass に変更。

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName rv.insas.jp

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/rv.insas.jp/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/rv.insas.jp/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/rv.insas.jp-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/rv.insas.jp-ssl-access.log combined
</VirtualHost>
</IfModule>
